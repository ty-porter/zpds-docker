services:
  fastdl:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./server:/opt/steam/server:ro
      - ./fastdl/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  zp-server:
    build:
      context: .
    command:
      - -console -game zp -condebug -debug +port 27016 +maxplayers 16 -secure +map zp_thelabs -wadautodetect
    ports:
      - "27016:27016/udp"
      - "27015:27015/tcp"
      - "27005:27005/udp"
      - "26900:26900/udp"
    cap_add:
      - CAP_LINUX_IMMUTABLE
    volumes:
      - ./server:/opt/steam/server
    restart: unless-stopped
