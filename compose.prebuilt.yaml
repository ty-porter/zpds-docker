services:
  fastdl:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - server-data:/opt/steam/server:ro
      - ./fastdl/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  zp-server:
    image: ${IMAGE}
    command:
      - -game zp +port 27016 +maxplayers 16 -secure +map zp_thelabs
    ports:
      - "27016:27016/udp"
      - "27015:27015/tcp"
      - "27005:27005/udp"
      - "26900:26900/udp"
    volumes:
      - server-data:/opt/steam/server
    restart: unless-stopped

volumes:
  server-data: